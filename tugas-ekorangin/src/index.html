<!DOCTYPE html>
<html lang="en">
<head>

   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Latihan Tailwind CSS</title>
   <link rel="stylesheet" href="./output.css">
</head>
<body class="flex justify-center ">
   <div class="flex flex-wrap basis-full border rounded bg-slate-300 m-4 ">
      <div class=" border flex basis-full h-10 text-center text-white p-2 justify-center font-bold bg bg-slate-700">
         DAFTAR NAMA IKANNN
      </div>
      
      <section id="input" class="flex basis-full justify-between p-2">
         <input type="text" name="assignment" id="assignment" 
                class="flex basis-1/2 border rounded"
                placeholder="Nama Ikan">
         <input type="button" id="btn-tambah" value="TAMBAH"
                class="border border-green-300 rounded px-4 mx-4 bg-green-300 font-semibold">
      </section>
      <section id="output" class="flex flex-wrap basis-full justify-between"></section>
   </div>
   
   <section id="output" class=""></section>
   <script src="main.js"></script>
</body>
</html>
